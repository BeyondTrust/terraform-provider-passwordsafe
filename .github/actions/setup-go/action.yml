name: "Setup Go"

description: "Configure the Go toolchain from go.mod with module caching enabled."

inputs:
  check-latest:
    description: "Check for the latest available patch of the go.mod Go version."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
        check-latest: ${{ inputs.check-latest }}
        cache-dependency-path: "**/go.sum"
