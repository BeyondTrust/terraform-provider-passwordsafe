# Validates that the GoReleaser build matrix compiles on every PR, before the
# real Release workflow runs it on main. Snapshot mode skips publish/announce, and
# we additionally skip signing (--skip=sign) since the GPG key is not available
# here, so no secrets are needed and it is safe to run on PRs from forks.
name: Build Snapshot

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: GoReleaser Snapshot Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0  # GoReleaser needs full tag history to compute the version

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=sign
        env:
          GITHUB_TOKEN: ${{ github.token }}
