name: Promote Candidate Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  sbom:
    name: Bill of Materials
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Generate SBOM
        uses: advanced-security/sbom-generator-action@6fe43abf522b2e7a19bc769aec1e6c848614b517 # v0.0.2
        id: sbom
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Attach SBOM
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.sbom.outputs.fileName }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

  promote-jfrog-prod:
    name: Promote to Jfrog's Prod environment
    uses: BeyondTrust/workflows/.github/workflows/promote-jfrog-release-bundle.yaml@51e9f52f8446a28edae9c7277ce1a612b86570ea # v4.13.1
    permissions:
      pull-requests: write
    secrets: inherit

  publish-terraform-registry:
    name: Publish to Terraform Registry
    runs-on: ubuntu-latest
    needs: [promote-jfrog-prod]
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Retrieve version
        id: info
        run: |
          echo "version=$(grep -oP '[\d]+\.[\d]+\.[\d]+' version.txt)" >> $GITHUB_OUTPUT

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser release
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          VERSION: ${{ steps.info.outputs.version }}

      - name: Run Automation Tests after release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const workflowId = 'automation-tests.yaml';
            const dispatchTime = new Date().toISOString();

            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

            async function findLatestAutomationTestsRun() {
              const tests_workflow_runs = await github.request('GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs', {
                 owner: context.repo.owner,
                 repo: context.repo.repo,
                 workflow_id: workflowId,
                 event: 'workflow_dispatch'
              });

              if (!tests_workflow_runs.data.workflow_runs || tests_workflow_runs.data.workflow_runs.length === 0) {
                 return null;
              }

              const candidates = tests_workflow_runs.data.workflow_runs
                .filter(run =>
                  run.name === 'Automation Tests' &&
                  run.created_at >= dispatchTime
                )
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              return candidates.length > 0 ? candidates[0] : null;
            }

            await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: context.ref,
              inputs: {
                'build_origin': 'PROD'
              }
            });

            let automationTestsRun = await findLatestAutomationTestsRun();
            while (!automationTestsRun) {
              await sleep(5000);
              automationTestsRun = await findLatestAutomationTestsRun();
            }

            let status = automationTestsRun.status;
            let conclusion = automationTestsRun.conclusion;

            while (status === 'queued' || status === 'in_progress') {
              const runDetails = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}', {
                 owner: context.repo.owner,
                 repo: context.repo.repo,
                 run_id: automationTestsRun.id
              });

              automationTestsRun = runDetails.data;
              status = automationTestsRun.status;
              conclusion = automationTestsRun.conclusion;

              if (status === 'queued' || status === 'in_progress') {
                await sleep(180000);
              }
            }

            if(conclusion !== 'success'){
              core.setFailed('Automation tests did not complete successfully. Workflow\'s conclusion: ' + conclusion);
            }
