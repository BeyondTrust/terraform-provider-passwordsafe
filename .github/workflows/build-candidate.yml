# Terraform Provider release workflow.
name: "Build artifacts before release"

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-service:
    name: Release Provider to Jfrog
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    env:
      JF_ENV_1: ${{ secrets.ARTIFACTORY_DEPLOYER }}
      JFROG_CLI_BUILD_NAME: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup JFrog
        uses: beyondtrust/setup-jfrog-cli@26d84636538c322aed2f822374a0b976b23caa81 # v2.4.3
        id: configure

      - name: Retrieve version
        id: info
        run: |
          echo "version=$(grep -oP '[\d]+\.[\d]+\.[\d]+' version.txt)" >> $GITHUB_OUTPUT

      - name: Configure JFrog CLI build number
        run: |
          echo "JFROG_CLI_BUILD_NUMBER=${{ steps.info.outputs.version }}" >> $GITHUB_ENV

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser build
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          VERSION: ${{ steps.info.outputs.version }}

      - name: Preparing artifacts and Publish to Jfrog
        run: |
          mkdir -p beyondtrust/passwordsafe/terraform-provider-passwordsafe/
          mv *.zip beyondtrust/passwordsafe/terraform-provider-passwordsafe/
          jf rt u "beyondtrust/passwordsafe/terraform-provider-passwordsafe/*" eng-tf-provider-dev-local
        working-directory: dist

      - name: Create JFrog Release Bundle
        id: release-bundle
        shell: bash
        run: |
          cat > /tmp/spec.json << EOF
          {
            "files": [
              {
                "pattern": "eng-generic-qa-local/beyondtrust/passwordsafe/terraform-provider-passwordsafe/*"
              }
            ]
          }
          EOF

          jf rbc --signing-key="${{ steps.configure.outputs.evidence-signing-key-name }}" \
            "${{ steps.configure.outputs.build-name }}" "${{ steps.info.outputs.version }}-${{ github.run_number }}" \
            --spec=/tmp/spec.json

  build-validate:
    runs-on: ubuntu-latest
    needs: [build-service]
    permissions:
      security-events: read
    steps:
      - name: Validate security center
        uses: beyondtrust/security-validation-action@6a9cc1a4f0e5cc4650e3423430cfb56942f6bd7e # v2.2.0
