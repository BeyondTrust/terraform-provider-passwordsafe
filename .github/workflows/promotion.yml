name: Build promotion

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  promotion:
    runs-on: ubuntu-latest
    name: Promote built artifact
    steps:
      - name: Jfrog setup
        uses: jfrog/setup-jfrog-cli@c32bf10843e4071112c4ea3abf622d3b27cd8c17 # v4.7.0
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          oidc-provider-name: ${{ vars.OIDC_PROVIDER_NAME_PROD }}

      - name: Extract version
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: version
        with:
          script: |
            const version = context.ref.match(/[\d][\d*\.]*$/)[0];
            core.setOutput("version", version);

      - name: Promote artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NAME="${{ github.event.repository.name }}"

          BUILD_NUMBER=$(
            jf rt curl api/build/${BUILD_NAME} -s | \
            jq -r "
              [
                .buildsNumbers[]
                | select(.uri | contains(\"$VERSION\"))
              ]
              | sort_by(.started)
              | reverse
              | .[0].uri[1:]
            "
          )

          if [ -z "$BUILD_NUMBER" ]; then
            echo "::error::Error retrieving build from Artifactory. No matching name/version. Name: $BUILD_NAME; Version: $VERSION"
            exit 1
          fi

          echo "Promoting terraform provider $BUILD_NAME $BUILD_NUMBER"
          jf rt build-promote  "$BUILD_NAME" "$BUILD_NUMBER" eng-tf-provider-prod-local --status released --copy=true
