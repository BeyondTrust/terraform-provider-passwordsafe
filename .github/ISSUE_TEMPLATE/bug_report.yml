name: Bug Report
description: Report a problem with the BeyondTrust Password Safe Terraform provider.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please do not include
        secrets, access tokens, or other sensitive values in this report.
  - type: input
    id: provider-version
    attributes:
      label: Provider version
      description: The version of `BeyondTrust/passwordsafe` you are using.
      placeholder: "e.g. 1.2.2"
    validations:
      required: true
  - type: input
    id: terraform-version
    attributes:
      label: Terraform version
      placeholder: "e.g. 1.10.5"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal Terraform configuration and the steps to reproduce.
      render: hcl
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output with `TF_LOG=DEBUG` if available. Redact any sensitive values.
      render: shell
    validations:
      required: false
